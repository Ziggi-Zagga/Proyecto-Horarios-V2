<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado | Gestor Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="contenedor resultado-container">
        <div class="card resultado-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <div class="icon" style="margin: 0 auto 15px auto; background: rgba(16, 185, 129, 0.1); color: var(--accent-color);">🏆</div>
                <h2>Resultado de la <span class="highlight">Evaluación</span></h2>
                <p style="color: var(--text-muted); margin-top: 10px;">{{ datos.mensaje }}</p>
            </div>

            <ul class="resultado-lista">
                <li>
                    <span>Slot Óptimo</span>
                    <span class="destacado">{{ datos.slot_optimo }}</span>
                </li>
                <li>
                    <span>Coste Total</span>
                    <span style="font-weight: 600;">{{ datos.coste_total }} puntos</span>
                </li>
                <li>
                    <span>Peor Penalización</span>
                    <span style="font-weight: 600; color: #ef4444;">{{ datos.peor_penalizacion }} puntos</span>
                </li>
            </ul>

            <div style="text-align: center; margin-top: 30px;">
                <button onclick="window.close()" class="btn btn-secondary">Cerrar ventana</button>
            </div>
        </div>
    </main>
</body>
</html>
